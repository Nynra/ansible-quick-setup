---
- name: Set up bash environment
  block:
  - name: Set bash as default shell
    user:
      name: "{{ bash_user }}"
      shell: /bin/bash
    become: true

  - name: Get stats of a file
    ansible.builtin.stat:
      path: "{{ ansible_env.HOME }}/.bashrc"
    register: bash

  - name: bash debug    
    ansible.builtin.debug:
      msg: "bashrc file does not exist (path doesn't exist)"
    when: bash.stat.exists == False

  - name: bash debug
    ansible.builtin.debug:
      msg: "bashrc exists"
    when: bash.stat.exists 

  - name: Edit .bashrc file
    ansible.builtin.blockinfile:
      path: "{{ ansible_env.HOME }}/.bashrc"
      backup: yes
      block: |
        export GOROOT=/usr/lib/go
        export GOPATH=$HOME/go
        export PATH="$PATH:/usr/sbin:/sbin:/bin:/usr/bin:/etc:/usr/ucb:/usr/local/bin:/usr/local/local_dfs/bin:/usr/bin/X11:/usr/local/sas"
        #export PATH="$PATH:/home/user/.local/bin"

        EDITOR=/usr/bin/vim
        export EDITOR

        export TERM=xterm-color
        unset MAILCHECK 

        ## Append to history file; do not overwrite
        shopt -s histappend
        
        ## Where to search for manual pages
        export MANPATH="/usr/share/man:/usr/local/man:/usr/local/local_dfs/man"
        
        ## grep aliases
        alias grep="grep --color=auto"

        ## List open ports
        alias ports="netstat -tulanp"

        ## Extract file, example. "ex package.tar.bz2"
        ex() {
          if [[ -f $1 ]]; then
            case $1 in
              *.tar.bz2) tar xjf $1 ;;
              *.tar.gz)  tar xzf $1 ;;
              *.bz2)     bunzip2 $1 ;;
              *.rar)     rar x $1 ;;
              *.gz)      gunzip $1  ;;
              *.tar)     tar xf $1  ;;
              *.tbz2)    tar xjf $1 ;;
              *.tgz)     tar xzf $1 ;;
              *.zip)     unzip $1 ;;
              *.Z)       uncompress $1 ;;
              *.7z)      7z x $1 ;;
              *)         echo $1 cannot be extracted ;;
            esac
          else
            echo $1 is not a valid file
          fi
        }
        # ex() is copied from https://github.com/Raikia/Kali-Setup/blob/master/kali.py

- name: Set up Tmux
  block:
  # Install tmux
  - name: Ensure tmux is installed
    ansible.builtin.apt:
      name: tmux
      state: present
    become: true

  - name: Create tmux configuration directory
    ansible.builtin.file:
      path: "~{{ ansible_user_id }}/.tmux"
      state: directory
      mode: '0755'

  - name: Download tmux Plugin Manager
    ansible.builtin.git:
      repo: https://github.com/tmux-plugins/tpm 
      dest: "~{{ ansible_user_id }}/.tmux/plugins/tpm"
      version: master

  - name: Change ownership of tmux configuration directory
    ansible.builtin.file:
      path: "~{{ ansible_user_id }}/.tmux"
      owner: "{{ ansible_user_id }}"
      group: "{{ ansible_user_id }}"

  - name: Deploy .tmux.conf template
    ansible.builtin.template:
      src: tmux.conf.j2
      dest: "~{{ ansible_user_id }}/.tmux.conf"
      mode: '0644'

  - name: Create Pentest Workspace Launcher
    ansible.builtin.copy:
      dest: /usr/local/bin/pt-workspace
      mode: '0755'
      content: |
        #!/bin/bash
        # Launch a tmux session with a 3-pane layout: Main, Listener, and Logs
        SESSION="pentest_$(date +%s)"
        tmux new-session -d -s $SESSION
        tmux split-window -h
        tmux split-window -v
        tmux select-pane -t 0
        tmux attach-session -t $SESSION
    become: true
