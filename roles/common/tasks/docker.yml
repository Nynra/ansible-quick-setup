---
- name: Install ca-certificates and curl
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present

- name: Create apt keyrings directory
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Setup Docker Official Repository for Ubuntu
  when: ansible_facts['os_family'] == "Ubuntu"
  block:
  - name: Download Docker GPG key
    become: true
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'

  - name: Add Docker repository to sources.list.d
    become: true
    ansible.builtin.copy:
      dest: /etc/apt/sources.list.d/docker.sources
      content: |
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: {{ ansible_distribution_release }}
        Components: stable
        Architectures: {{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
        Signed-By: /etc/apt/keyrings/docker.asc

- name: Setup Docker Official Repository for Debian
  when: ansible_facts['os_family'] == "Debian"
  block:
  - name: Download Docker GPG key
    become: true
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/debian/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'

  - name: Add Docker repository to sources.list.d
    become: true
    ansible.builtin.copy:
      dest: /etc/apt/sources.list.d/docker.sources
      content: |
        Types: deb
        URIs: https://download.docker.com/linux/debian
        Suites: {{ ansible_distribution_release }}
        Components: stable
        Architectures: {{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
        Signed-By: /etc/apt/keyrings/docker.asc

- name: Final apt update
  become: true
  ansible.builtin.apt:
    update_cache: yes

- name: "Install docker"
  block:
    - name: Install packages
      become: true
      apt:
        update_cache: true
        state: fixed
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Start the docker service
      become: true
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      notify: Docker service up and running
    
    - name: "Add {{ user }} to docker group"
      become: true
      user:
        name: "{{ user }}"
        append: yes
        groups: docker
      notify: Run docker hello world


- name: Pull specified Docker images
  when: common_docker_images | length > 0
  block:
    - name: Pull Docker images
      ansible.builtin.docker_image:
        name: "{{ item }}"
        source: pull
      loop: "{{ common_docker_images }}"
      loop_control:
        label: "{{item}}"